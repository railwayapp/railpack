name: Docker Image Benchmark

# Runs in the base repo context (full write permissions) after "Run Tests"
# completes. This is necessary because fork PRs restrict GITHUB_TOKEN to
# read-only, which prevents posting benchmark comparison comments.
on:
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]

jobs:
  docker-image-benchmark:
    # skip if the triggering workflow did not succeed
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      # required for benchmark-action to push to gh-pages on main
      contents: write
      # required to post comparison comments on PRs
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/download-artifact cannot cross workflow boundaries.
      # dawidd6/action-download-artifact works around this limitation and fetches artifacts from a specific run ID.
      - name: Download all size artifacts
        uses: dawidd6/action-download-artifact@2536c51d3d126276eb39f74d6bc9c72ac6ef30d3
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: size-*
          name_is_regexp: true

      - name: Merge size.json files into benchmark format
        # customSmallerIsBetter expects [{name, unit, value}]; also emit a simple size.json for manual inspection
        run: |
          # create a master size.json for manual debugging
          jq -s '[.[] | .] | sort_by(.name)' size-*/size.json > size.json
          # benchmark payload compared against the history stored in gh-pages
          jq -s '[.[] | {name: .name, unit: "bytes", value: .size}]' size-*/size.json > benchmark.json

      - name: Upload merged size.json
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: sizes
          path: size.json

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@a7bc2366eda11037936ea57d811a43b3418d3073
        with:
          tool: customSmallerIsBetter
          output-file-path: benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # only persist history when the triggering push landed on main
          auto-push: ${{ github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event == 'push' }}
          # post size comparison comment on every PR
          comment-always: true
          benchmark-data-dir-path: dev/bench
          # alert when an image grows more than 20%
          alert-threshold: '120%'
          comment-on-alert: true
