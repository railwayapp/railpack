name: Update Mise Version

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  MISE_ENV: ci
  # Test JavaScript actions on Node.js 24 ahead of GitHub Actions' default switch
  # on 2026-06-02. See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-mise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      # We manually configure the git user here to support the mise-upgrade script
      # which handles the commit and PR creation. This keeps the script as the
      # single source of truth for both local and CI usage.
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - run: mise run mise-upgrade
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Enable verbose mise logging to aid debugging of upgrade failures.
          MISE_DEBUG: "1"
          # go-snaps ignores UPDATE_SNAPS when CI is detected, preventing snapshot
          # writes. This overrides that so the mise-upgrade script can update them.
          CI: false
