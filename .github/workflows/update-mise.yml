name: Update Mise Version

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  MISE_ENV: ci

jobs:
  update-mise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151

      # We manually configure the git user here to support the mise-upgrade script
      # which handles the commit and PR creation. This keeps the script as the
      # single source of truth for both local and CI usage.
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - run: mise run mise-upgrade
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # go-snaps ignores UPDATE_SNAPS when CI is detected, preventing snapshot
          # writes. This overrides that so the mise-upgrade script can update them.
          CI: false
