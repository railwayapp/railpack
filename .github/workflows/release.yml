# checkout RELEASE.md for more information
name: Release

on:
  push:
    # pushing a new tag is what triggers the release process
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  MISE_ENV: ci

jobs:
  publish-builder:
    runs-on: ubuntu-latest
    steps:
      # duplicated on the integration-tests.yml job, keep these in sync
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.PRODUCTION_CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Tags & Metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.PRODUCTION_BUILDER_IMAGE_NAME }}
          # latest tag is automatically generated
          tags: |
            type=raw,value=debian-bookworm
            type=semver,pattern={{version}}
            type=raw,value=${{ env.PRODUCTION_MISE_TAG }}
            type=sha,format=long
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: images/debian/build
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MISE_VERSION=${{ env.RAILPACK_MISE_VERSION }}

  publish-runtime:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ github.repository }}-runtime
    steps:
      # duplicated on the integration-tests.yml job, keep these in sync
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.PRODUCTION_CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Tags & Metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          # the mise version is NOT required for the runtime image, but it is helpful to have them tagged using the same exact version
          # this makes it easy to ensure we (a) pin the runtime and build images to the same external build image and (b) allows us to build
          # these images *before* the railpack binary build step to ensure they are properly created (railpack relies on them existing, so we want
          # a successful builder + runtime image build before building and releasing a new railpack frontend).
          images: ${{ env.PRODUCTION_RUNTIME_IMAGE_NAME }}
          # latest tag is automatically generated
          tags: |
            type=raw,value=debian-bookworm
            type=semver,pattern={{version}}
            type=raw,value=${{ env.PRODUCTION_MISE_TAG }}
            type=sha,format=long
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: images/debian/runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    runs-on: ubuntu-latest
    needs: [publish-builder, publish-runtime]
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@5ac50f778e26fac95da98d50503682459e86d566
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.PRODUCTION_CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Release Updated Railpack CLI and Frontend Images
        id: goreleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
