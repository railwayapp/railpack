# checkout RELEASE.md for more information
name: Release

on:
  push:
    # pushing a new tag is what triggers the release process
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  MISE_ENV: ci

jobs:
  publish-builder:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ github.repository }}-builder
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Read mise version
        id: mise-version
        run: echo "version=$(cat core/mise/version.txt)" >> $GITHUB_OUTPUT

      - name: Generate Tags & Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=mise-${{ steps.mise-version.outputs.version }}
            type=raw,value=debian-bookworm
            type=sha,format=long
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: images/debian/build
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MISE_VERSION=${{ steps.mise-version.outputs.version }}

  publish-runtime:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ github.repository }}-runtime
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Read mise version
        id: mise-version
        run: echo "version=$(cat core/mise/version.txt)" >> $GITHUB_OUTPUT

      - name: Generate Tags & Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # the mise version is NOT required for the runtime image, but it is helpful to have them tagged using the same exact version
          # this makes it easy to ensure we (a) pin the runtime and build images to the same external build image and (b) allows us to build
          # these images *before* the railpack binary build step to ensure they are properly created (railpack relies on them existing, so we want
          # a successful builder + runtime image build before building and releasing a new railpack frontend).
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=mise-${{ steps.mise-version.outputs.version }}
            type=raw,value=debian-bookworm
            type=sha,format=long
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: images/debian/build
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    runs-on: ubuntu-latest
    needs: [publish-builder, publish-runtime]
    env:
      # TODO unclear why this is necessary
      DOCKER_CLI_EXPERIMENTAL: "enabled"
      # this is referenced by the .goreleaser.yml config
      FRONTEND_IMAGE: "ghcr.io/railwayapp/railpack-frontend"
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # setup go language versions and other build dependencies
      - uses: jdx/mise-action@5ac50f778e26fac95da98d50503682459e86d566
          
      # used to tag build and runtime images
      - name: Read mise version
        id: mise-version
        run: echo "version=$(cat core/mise/version.txt)" >> $GITHUB_OUTPUT

      - name: Release Updated Railpack CLI and Frontend Images
        id: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
