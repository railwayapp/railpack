name: Integration Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  pull_request:
    paths-ignore:
      - "docs/**"
  schedule:
    # run every day to alert against breaking changes in mise backends
    # the backends used for various projects (in registry.toml) are compiled into the mise binary, but the code that runs
    # these backends, and the services they connect to are not. By running integration tests each day, we'll know if
    # something changes in the package ecosystem that breaks one of our build tests.
    - cron: "0 0 * * *"

env:
  MISE_ENV: ci

jobs:
  # generate a JSON array of all entries in examples/ to shard out example into a separate job that can be run in parallel
  find-examples:
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.find-examples.outputs.examples }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Find examples with test.json
        id: find-examples
        run: |
          examples=$(find examples -name "test.json" -exec dirname {} \; | xargs -n 1 basename | jq -R -s -c 'split("\n")[:-1]')
          echo "examples=$examples" >> "$GITHUB_OUTPUT"
  
  # integration tests plan, build, and run example projects. Running the example projects requires both the builder and runtime
  # images. If the mise version changes, we want to ensure there are no breakages, which means we need to use fresh images
  # that contain the pinned mise version. The code below builds these requires images, and pushes them to a production
  # registry so they can be used properly in the matrix jobs (which all run in an isolated runner, so they must reference a remote registry).
  # These images are *not* tagged with `latest` or other more generic tags used in the release workflow. Additionally,
  # since railpack uses a image tag from the mise version compiled into the binary, pushes to the registry should not cause
  # any production impacts.
  build-images:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      # duplicated on the release.yml job, keep these in sync
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.PRODUCTION_CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # since railpack binary is pinned to a specific version, we only want to build and push the images if the mise version
      # has changed. This isn't *exactly* true, as there could be a world where we want to build a new image with a changed
      # dockerfile, but this should be extremely rare and would be an important breaking change. Mise versions should be
      # changed pretty frequently, which means we'll pick up any updates to the `FROM` images soon, so we shouldn't need
      # to update these images outside of a mise version update.
      - name: Check for mise version change
        id: mise_version
        run: |
          # clones are shallow by default
          git fetch origin main --depth=1

          if ! git diff --quiet origin/main HEAD -- core/mise/version.txt; then
            echo "changed=true" >> "$GITHUB_OUTPUT"            
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Builder Image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        if: steps.mise_version.outputs.changed == 'true'
        with:
          context: images/debian/build
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.PRODUCTION_BUILDER_IMAGE_REF }}
          build-args: MISE_VERSION=${{ env.RAILPACK_MISE_VERSION }}
          push: true
          # instead of figuring out the right "what's changed" mechanism
          cache-from: type=registry,ref=${{ env.PRODUCTION_BUILDER_IMAGE_REF }}
          # embed cache metadata into the image being pushed so it can be used on the next run against this PR
          cache-to: type=inline

      - name: Build Runtime Image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        if: steps.mise_version.outputs.changed == 'true'
        with:
          context: images/debian/runtime
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.PRODUCTION_RUNTIME_IMAGE_REF }}
          push: true
          cache-from: type=registry,ref=${{ env.PRODUCTION_BUILDER_IMAGE_REF }}
          cache-to: type=inline

  test:
    needs: [build-images, find-examples]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # create a separate job for each entry in examples/. i.e. gleam, elixir-ecto, etc
        example: ${{ fromJson(needs.find-examples.outputs.examples) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db

      - name: Cache Go modules and build artifacts
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          #   ~/.cache/go-build  -> GOCACHE (Compiled build artifacts)
          #   ~/go/pkg/mod       -> GOMODCACHE (Downloaded dependencies)
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('mise.lock') }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('mise.lock') }}-

      # not strictly required, but authenticating increases rate limits and reduces 429 errors
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.PRODUCTION_CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start BuildKit
        run: mise run run-buildkit-container

      # required for integration tests that use multiple platforms
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Run test for ${{ matrix.example }}
        env:
          # without the GITHUB_TOKEN, mise will 403 us
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # each test should be run with an exact match otherwise `gleam` will also match `gleam-custom` causing duplicate test runs
        run: |
          go test -v ./integration_tests \
            -run "^TestExamplesIntegration/${{ matrix.example }}$" \
            -timeout 20m

      - name: Upload size.json
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: size-x86-${{ matrix.example }}
          path: examples/${{ matrix.example }}/size.json
          if-no-files-found: ignore

      - name: Stop BuildKit
        if: always()
        run: docker stop buildkit

  # Same as `test`, but runs on native ARM hardware to catch ARM-specific failures
  # without QEMU emulation overhead.
  test-arm:
    needs: [build-images, find-examples]
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        example: ${{ fromJson(needs.find-examples.outputs.examples) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db

      - name: Cache Go modules and build artifacts
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          # include runner.arch so ARM and x86 caches don't collide
          key: go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.lock') }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.lock') }}-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.PRODUCTION_CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start BuildKit
        run: mise run run-buildkit-container

      # QEMU provides x86 emulation on this ARM runner for any cross-platform build steps
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Run test for ${{ matrix.example }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go test -v ./integration_tests \
            -run "^TestExamplesIntegration/${{ matrix.example }}$" \
            -timeout 20m

      - name: Upload size.json
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: size-arm-${{ matrix.example }}
          path: examples/${{ matrix.example }}/size.json
          if-no-files-found: ignore

      - name: Stop BuildKit
        if: always()
        run: docker stop buildkit

  # Collects size.json artifacts from both x86 and ARM matrix jobs, merges them
  # into a single benchmark payload with arch-suffixed names (e.g. "node-bun (x86)").
  # On main, pushes results to gh-pages to track history.
  # On PRs, compares against stored history and posts a comment with the delta.
  docker-image-benchmark:
    needs: [test, test-arm]
    runs-on: ubuntu-latest
    permissions:
      # required for benchmark-action to push to gh-pages on main
      contents: write
      # required to post comparison comments on PRs
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download all size artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        # each artifact lands in its own size-{x86,arm}-<example>/ directory
        with:
          pattern: size-*
          merge-multiple: false

      - name: Merge size.json files into benchmark format
        # customSmallerIsBetter expects [{name, unit, value}]; suffix name with arch for side-by-side comparison
        run: |
          jq -s 'map(. + {name: (.name + " (x86)")})' size-x86-*/size.json > x86.json
          jq -s 'map(. + {name: (.name + " (arm)")})' size-arm-*/size.json > arm.json
          jq -s 'add | sort_by(.name) | map({name, unit: "bytes", value: .size})' x86.json arm.json > benchmark.json

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@a7bc2366eda11037936ea57d811a43b3418d3073
        with:
          tool: customSmallerIsBetter
          output-file-path: benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # only persist history on main
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          benchmark-data-dir-path: dev/bench
          # alert when an image grows more than 20%
          alert-threshold: '120%'
          # Enable Job Summary for PRs
          summary-always: true
          # no comment-on-alert, comment-always; just on PR
