name: CI

# Security: Actions are pinned to commit SHAs instead of tags/versions where possible.
# Tags are mutable and can be force-pushed, allowing attackers to replace trusted
# code with malicious code. SHAs are immutable and protect against supply chain attacks.

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  pull_request:
    paths-ignore:
      - "docs/**"
  schedule:
    # run every day to alert against changes in default mise versions which break snapshot tests
    - cron: "0 0 * * *"

env:
  MISE_ENV: ci

jobs:
  test:
    name: Check and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m

      - name: Go Checks
        run: mise run check

      - name: Test Unit
        run: mise run test
